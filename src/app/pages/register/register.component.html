<div class="register">
  <h1>Registro</h1>
  <p>Bienvenido a SeniorVital. Configura tu perfil para mayor seguridad.</p>

  <div class="form-group">
    <label for="nombre">Nombre completo</label>
    <input
      id="nombre"
      type="text"
      placeholder="Ingresa tu nombre completo"
      [(ngModel)]="nombre"
    />
  </div>

  <div class="form-group">
    <label for="email">Correo electrónico</label>
    <input
      id="email"
      type="email"
      placeholder="Ingresa tu correo electrónico"
      [(ngModel)]="email"
    />
  </div>

  <div class="form-group">
    <label for="password">Contraseña</label>
    <input
      id="password"
      type="password"
      placeholder="Crea una contraseña"
      [(ngModel)]="password"
    />
  </div>

  <div class="emergency-section">
    <h2>Contactos de emergencia</h2>

    <div class="contact" *ngFor="let contacto of contactos; let i = index">
      <input
        type="text"
        placeholder="Nombre del contacto"
        [(ngModel)]="contacto.nombre"
      />
      <input
        type="tel"
        placeholder="Teléfono"
        [(ngModel)]="contacto.telefono"
      />
    </div>

    <button (click)="agregarContacto()">Agregar otro contacto</button>
  </div>

  <button class="btn-primary" (click)="continuar()">Continuar</button>
</div>
