<div class="travel-container">
  <div class="voice-back">
    <button routerLink="/" class="back-button">
      {{ "RETURN_HOME" | translate }}
    </button>
  </div>
  <h1>{{ "BOOK_TRAVEL" | translate }}</h1>

  <p class="travel-description">{{ "BOOK_TRAVEL_DESC" | translate }}</p>

  <p class="location-status" [ngClass]="hasLocation ? 'ok' : 'error'">
    📍 {{ locationStatus }}
  </p>

  <div class="transport-options">
    <button class="transport-button uber" (click)="openUber()">
      🚗 {{ "REQUEST_UBER" | translate }}
      <span class="button-sub">{{ "REQUEST_UBER_SUB" | translate }}</span>
    </button>

    <button class="transport-button taxi" (click)="openTaxi()">
      🚕 {{ "FIND_TAXI" | translate }}
      <span class="button-sub">{{ "FIND_TAXI_SUB" | translate }}</span>
    </button>

    <button class="transport-button family" (click)="callFamily()">
      👨‍👩‍👧 {{ "CALL_FAMILY" | translate }}
      <span class="button-sub">{{ "CALL_FAMILY_SUB" | translate }}</span>
    </button>
  </div>
</div>
