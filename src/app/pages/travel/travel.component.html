<div class="travel-container">
  <div class="voice-back">
    <button routerLink="/" class="back-button">← Return to Home</button>
  </div>
  <h1>Request Transport</h1>

  <p class="travel-description">
    Choose how you would like to request transportation.
  </p>

  <div class="transport-options">
    <a href="https://m.uber.com" target="_blank" class="transport-button uber">
      🚗 Request Uber
      <span class="button-sub">Book a ride through Uber</span>
    </a>

    <a
      href="https://maps.google.com/?q=taxi"
      target="_blank"
      class="transport-button taxi"
    >
      🚕 Find Taxi
      <span class="button-sub">Find a nearby taxi service</span>
    </a>

    <button class="transport-button family" (click)="callFamily('1234567890')">
      👨‍👩‍👧 Call Family for Pickup
      <span class="button-sub">Call your family for pickup</span>
    </button>
  </div>
</div>
