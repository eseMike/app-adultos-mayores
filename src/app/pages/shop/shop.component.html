<div class="shop-container">
  <div class="voice-back">
    <button routerLink="/" class="back-button">
      {{ "RETURN_HOME" | translate }}
    </button>
  </div>

  <h1>{{ "BUY_ESSENTIALS" | translate }}</h1>
  <p class="subtitle">{{ "SHOP_SUBTITLE" | translate }}</p>

  <button class="shop-button groceries" (click)="orderGroceries()">
    🛒 {{ "ORDER_GROCERIES" | translate }}
    <span class="button-sub">{{ "ORDER_GROCERIES_SUB" | translate }}</span>
  </button>

  <button class="shop-button medicine" (click)="orderMedicine()">
    💊 {{ "ORDER_MEDICINE" | translate }}
    <span class="button-sub">{{ "ORDER_MEDICINE_SUB" | translate }}</span>
  </button>

  <button class="shop-button daily" (click)="orderDailyNeeds()">
    🥤 {{ "DAILY_NEEDS" | translate }}
    <span class="button-sub">{{ "DAILY_NEEDS_SUB" | translate }}</span>
  </button>

  <button class="shop-button family" (click)="callFamily()">
    📞 {{ "CALL_FAMILY" | translate }}
    <span class="button-sub">{{ "CALL_FAMILY_SUB" | translate }}</span>
  </button>
</div>
