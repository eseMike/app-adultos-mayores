<div class="shop-container">
  <div class="voice-back">
    <button routerLink="/" class="back-button">← Return to Home</button>
  </div>

  <h1>Buy Essentials</h1>
  <p class="subtitle">
    Choose what you need and we will help you order safely.
  </p>

  <button class="shop-button groceries" (click)="orderGroceries()">
    🛒 Order Groceries
    <span class="button-sub">Open a trusted grocery store website</span>
  </button>

  <button class="shop-button medicine" (click)="orderMedicine()">
    💊 Order Medicine
    <span class="button-sub">Open a pharmacy website to order medicine</span>
  </button>

  <button class="shop-button daily" (click)="orderDailyNeeds()">
    🥤 Daily Needs
    <span class="button-sub">Shop everyday household items online</span>
  </button>

  <button class="shop-button family" (click)="callFamily()">
    📞 Call Family to Help
    <span class="button-sub">Call a trusted family member for help</span>
  </button>
</div>
