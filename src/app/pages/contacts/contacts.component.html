<div class="contacts-container">
  <div class="voice-back">
    <button routerLink="/" class="back-button">
      {{ "RETURN_HOME" | translate }}
    </button>
  </div>
  <h2>{{ "CONTACTS" | translate }}</h2>

  <div class="contact-card">
    <h3>{{ "DAUGHTER" | translate }}</h3>
    <div class="contact-actions">
      <button class="call-button" (click)="callContact('1234567890')">
        📞 {{ "CALL" | translate }}
        <span class="action-sub">{{ "TAP_TO_CALL" | translate }}</span>
      </button>
      <button class="message-button" (click)="messageContact('1234567890')">
        💬 {{ "MESSAGE" | translate }}
        <span class="action-sub">{{ "TAP_TO_MESSAGE" | translate }}</span>
      </button>
    </div>
  </div>

  <div class="contact-card">
    <h3>{{ "DOCTOR" | translate }}</h3>
    <div class="contact-actions">
      <button class="call-button" (click)="callContact('1234567890')">
        📞 {{ "CALL" | translate }}
        <span class="action-sub">{{ "TAP_TO_CALL" | translate }}</span>
      </button>
    </div>
  </div>

  <div class="contact-card">
    <h3>{{ "NEIGHBOR" | translate }}</h3>
    <div class="contact-actions">
      <button class="call-button" (click)="callContact('1234567890')">
        📞 {{ "CALL" | translate }}
        <span class="action-sub">{{ "TAP_TO_CALL" | translate }}</span>
      </button>
    </div>
  </div>
</div>
