<div class="contacts-container">
  <div class="voice-back">
    <button routerLink="/" class="back-button">← Return to Home</button>
  </div>
  <h2>Contacts</h2>

  <div class="contact-card">
    <h3>Daughter</h3>
    <div class="contact-actions">
      <button class="call-button" (click)="callContact('1234567890')">
        📞 Call <span class="action-sub">Tap to call</span>
      </button>
      <button class="message-button" (click)="messageContact('1234567890')">
        💬 Message <span class="action-sub">Tap to message</span>
      </button>
    </div>
  </div>

  <div class="contact-card">
    <h3>Doctor</h3>
    <div class="contact-actions">
      <button class="call-button" (click)="callContact('1234567890')">
        📞 Call <span class="action-sub">Tap to call</span>
      </button>
    </div>
  </div>

  <div class="contact-card">
    <h3>Neighbor</h3>
    <div class="contact-actions">
      <button class="call-button" (click)="callContact('1234567890')">
        📞 Call <span class="action-sub">Tap to call</span>
      </button>
    </div>
  </div>
</div>
