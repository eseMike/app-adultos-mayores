<div class="emergency-container">
  <div class="voice-back">
    <button routerLink="/" class="back-button">← Return to Home</button>
  </div>
  <h1>Emergency</h1>

  <p class="emergency-description">
    Press the button below to immediately call your main emergency contact.
  </p>

  <p class="emergency-hint">This will start a phone call right away.</p>

  <button class="emergency-button" (click)="confirmCall('1234567890')">
    🚨 CALL FOR HELP
  </button>

  <div class="emergency-contacts">
    <h3>Other Emergency Contacts</h3>

    <a class="contact-link" (click)="confirmCall('1234567890')">
      📞 Daughter
      <span class="contact-sub">Tap to call</span>
    </a>

    <a class="contact-link" (click)="confirmCall('1234567890')">
      📞 Doctor
      <span class="contact-sub">Tap to call</span>
    </a>

    <a class="contact-link" (click)="confirmCall('1234567890')">
      📞 Neighbor
      <span class="contact-sub">Tap to call</span>
    </a>
  </div>
</div>
